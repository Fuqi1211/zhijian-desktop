<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="纸间——一个安静、快速、完全保存在本地的双栏笔记应用。">
  <title>纸间 · 本地笔记</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #29372f;
      --ink-soft: #69766d;
      --ink-faint: #929d95;
      --paper: #edf3e9;
      --paper-deep: #dfe9dc;
      --sheet: #f8fbf4;
      --panel: rgba(229, 238, 224, 0.9);
      --line: rgba(55, 83, 64, 0.13);
      --line-strong: rgba(55, 83, 64, 0.22);
      --accent: #4f7a60;
      --accent-dark: #356047;
      --accent-soft: #d2e5d5;
      --accent-contrast: #f7fbf4;
      --moss: #748a61;
      --shadow: 0 24px 70px rgba(42, 73, 52, 0.13);
      --sans: "MiSans", "HarmonyOS Sans SC", "Microsoft YaHei UI", sans-serif;
      --serif: "LXGW WenKai", "Source Han Serif SC", "Noto Serif CJK SC", "Songti SC", serif;
    }

    [data-theme="dark"] {
      color-scheme: dark;
      --ink: #e1eadf;
      --ink-soft: #a8b5aa;
      --ink-faint: #78847a;
      --paper: #18231c;
      --paper-deep: #223027;
      --sheet: #1d2921;
      --panel: rgba(27, 41, 32, 0.94);
      --line: rgba(225, 234, 223, 0.1);
      --line-strong: rgba(225, 234, 223, 0.18);
      --accent: #7eab8c;
      --accent-dark: #a4c8ad;
      --accent-soft: #294638;
      --accent-contrast: #142219;
      --moss: #a1b58a;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.32);
    }

    * { box-sizing: border-box; }

    html, body { height: 100%; }

    body {
      margin: 0;
      overflow: hidden;
      color: var(--ink);
      background:
        radial-gradient(circle at 86% 14%, rgba(86, 130, 103, 0.12), transparent 27%),
        radial-gradient(circle at 18% 92%, rgba(150, 169, 112, 0.09), transparent 31%),
        var(--paper);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
    }

    button, input, select { font: inherit; }
    button { color: inherit; }

    .app {
      display: grid;
      grid-template-columns: 360px minmax(0, 1fr);
      grid-template-rows: minmax(0, 1fr);
      width: 100%;
      height: 100dvh;
      overflow: hidden;
      animation: app-in 560ms cubic-bezier(.2,.8,.2,1) both;
    }

    @keyframes app-in {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .sidebar {
      position: relative;
      z-index: 3;
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
      background: var(--panel);
      border-right: 1px solid var(--line);
      backdrop-filter: blur(18px);
    }

    .sidebar::after {
      content: "";
      position: absolute;
      top: 0;
      right: -1px;
      width: 1px;
      height: 100%;
      background: linear-gradient(transparent, var(--line-strong), transparent);
      pointer-events: none;
    }

    .brand-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 22px 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 11px;
      min-width: 0;
    }

    .brand-mark {
      position: relative;
      width: 34px;
      height: 38px;
      flex: 0 0 auto;
      border: 1px solid var(--line-strong);
      border-radius: 4px 12px 4px 4px;
      background: var(--sheet);
      box-shadow: 4px 4px 0 var(--accent-soft);
      transform: rotate(-2deg);
    }

    .brand-mark::before,
    .brand-mark::after {
      content: "";
      position: absolute;
      left: 8px;
      height: 1px;
      background: var(--accent);
    }

    .brand-mark::before { top: 13px; width: 17px; }
    .brand-mark::after { top: 20px; width: 12px; }

    .brand-name {
      font-family: var(--serif);
      font-size: 21px;
      font-weight: 700;
      letter-spacing: .15em;
    }

    .brand-sub {
      margin-top: 2px;
      color: var(--ink-faint);
      font-size: 10px;
      letter-spacing: .16em;
      text-transform: uppercase;
    }

    .icon-button,
    .new-note,
    .filter-button,
    .tool-button,
    .tag-chip,
    .menu-button {
      border: 0;
      cursor: pointer;
      transition: background 160ms ease, color 160ms ease, transform 160ms ease, border-color 160ms ease;
    }

    .icon-button {
      display: inline-grid;
      place-items: center;
      width: 36px;
      height: 36px;
      padding: 0;
      border: 1px solid transparent;
      border-radius: 12px;
      background: transparent;
    }

    .icon-button:hover {
      background: var(--sheet);
      border-color: var(--line);
      transform: translateY(-1px);
    }

    .icon-button svg,
    .tool-button svg,
    .search-icon svg,
    .new-note svg { width: 18px; height: 18px; }

    .search-wrap {
      position: relative;
      margin: 2px 20px 14px;
    }

    .search-icon {
      position: absolute;
      left: 13px;
      top: 50%;
      display: grid;
      place-items: center;
      color: var(--ink-faint);
      transform: translateY(-50%);
      pointer-events: none;
    }

    #searchInput {
      width: 100%;
      height: 43px;
      padding: 0 54px 0 41px;
      color: var(--ink);
      background: color-mix(in srgb, var(--sheet) 72%, transparent);
      border: 1px solid var(--line);
      border-radius: 13px;
      outline: none;
      transition: border 160ms ease, box-shadow 160ms ease, background 160ms ease;
    }

    #searchInput:focus {
      background: var(--sheet);
      border-color: color-mix(in srgb, var(--accent) 52%, transparent);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent-soft) 62%, transparent);
    }

    .shortcut {
      position: absolute;
      right: 11px;
      top: 50%;
      padding: 3px 6px;
      color: var(--ink-faint);
      background: var(--paper-deep);
      border: 1px solid var(--line);
      border-radius: 6px;
      font-size: 10px;
      transform: translateY(-50%);
      pointer-events: none;
    }

    .filter-row {
      display: flex;
      gap: 6px;
      padding: 0 20px 13px;
    }

    .filter-button {
      padding: 7px 12px;
      color: var(--ink-soft);
      background: transparent;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 650;
    }

    .filter-button:hover,
    .filter-button.active {
      color: var(--ink);
      background: var(--sheet);
      box-shadow: 0 2px 8px rgba(60, 50, 35, .05);
    }

    .filter-count {
      margin-left: 4px;
      color: var(--ink-faint);
      font-variant-numeric: tabular-nums;
    }

    .tag-strip {
      display: flex;
      gap: 6px;
      min-height: 30px;
      padding: 0 20px 12px;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .tag-strip::-webkit-scrollbar { display: none; }

    .tag-chip {
      flex: 0 0 auto;
      padding: 5px 9px;
      color: var(--moss);
      background: color-mix(in srgb, var(--moss) 9%, transparent);
      border: 1px solid color-mix(in srgb, var(--moss) 15%, transparent);
      border-radius: 7px;
      font-size: 11px;
    }

    .tag-chip:hover,
    .tag-chip.active {
      color: var(--sheet);
      background: var(--moss);
      border-color: var(--moss);
    }

    .list-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 22px 8px;
      color: var(--ink-faint);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .15em;
      text-transform: uppercase;
    }

    .notes-list {
      flex: 1;
      min-height: 0;
      padding: 0 12px 14px;
      overflow-y: auto;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
      scrollbar-color: var(--line-strong) transparent;
      scrollbar-width: thin;
    }

    .note-card {
      position: relative;
      width: 100%;
      margin-bottom: 5px;
      padding: 15px 15px 14px 17px;
      text-align: left;
      color: inherit;
      background: transparent;
      border: 1px solid transparent;
      border-radius: 14px;
      cursor: pointer;
      transition: background 160ms ease, border-color 160ms ease, transform 160ms ease;
    }

    .note-card:hover {
      background: color-mix(in srgb, var(--sheet) 62%, transparent);
      transform: translateX(2px);
    }

    .note-card.active {
      background: var(--sheet);
      border-color: var(--line);
      box-shadow: 0 7px 22px rgba(63, 51, 34, .07);
    }

    .note-card.active::before {
      content: "";
      position: absolute;
      left: -1px;
      top: 15px;
      bottom: 15px;
      width: 3px;
      background: var(--accent);
      border-radius: 0 3px 3px 0;
    }

    .note-card-head {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .note-card-title {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      font-family: var(--serif);
      font-size: 15px;
      font-weight: 700;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .pin-dot {
      width: 6px;
      height: 6px;
      flex: 0 0 auto;
      background: var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .note-card-preview {
      display: -webkit-box;
      margin-top: 7px;
      overflow: hidden;
      color: var(--ink-soft);
      font-size: 12px;
      line-height: 1.55;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
    }

    .note-card-meta {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-top: 10px;
      overflow: hidden;
      color: var(--ink-faint);
      font-size: 10px;
      white-space: nowrap;
    }

    .note-card-meta .mini-tag {
      max-width: 92px;
      padding: 2px 6px;
      overflow: hidden;
      color: var(--moss);
      background: color-mix(in srgb, var(--moss) 8%, transparent);
      border-radius: 5px;
      text-overflow: ellipsis;
    }

    .list-empty {
      display: grid;
      place-items: center;
      min-height: 220px;
      padding: 36px;
      color: var(--ink-faint);
      text-align: center;
      font-family: var(--serif);
      line-height: 1.8;
    }

    .sidebar-footer {
      display: flex;
      flex: 0 0 auto;
      align-items: center;
      gap: 3px;
      padding: 11px 16px 14px;
      border-top: 1px solid var(--line);
    }

    .theme-control {
      position: relative;
      display: flex;
      align-items: center;
      gap: 5px;
      height: 39px;
      padding: 0 7px;
      color: var(--ink-soft);
      background: color-mix(in srgb, var(--sheet) 58%, transparent);
      border: 1px solid var(--line);
      border-radius: 10px;
      transition: color 160ms ease, background 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
    }

    .theme-control:hover {
      color: var(--ink);
      background: var(--sheet);
      border-color: var(--line-strong);
    }

    .theme-control:focus-within {
      border-color: color-mix(in srgb, var(--accent) 58%, transparent);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent-soft) 62%, transparent);
    }

    .theme-control svg { width: 16px; height: 16px; flex: 0 0 auto; }

    #themeSelect {
      width: 54px;
      padding: 0;
      color: inherit;
      background: transparent;
      border: 0;
      outline: 0;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
    }

    #themeSelect option { color: var(--ink); background: var(--sheet); }

    .new-note {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      height: 39px;
      margin-left: auto;
      padding: 0 14px;
      color: var(--accent-contrast);
      background: var(--accent);
      border-radius: 11px;
      box-shadow: 0 7px 18px color-mix(in srgb, var(--accent) 24%, transparent);
      font-size: 12px;
      font-weight: 700;
    }

    .new-note:hover { background: var(--accent-dark); transform: translateY(-1px); }

    .editor-shell {
      position: relative;
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 0;
      background:
        linear-gradient(90deg, transparent 49px, color-mix(in srgb, var(--accent) 7%, transparent) 50px, transparent 51px),
        var(--sheet);
    }

    .editor-shell::before {
      content: "";
      position: absolute;
      inset: 0;
      opacity: .35;
      background-image: repeating-linear-gradient(0deg, transparent 0, transparent 31px, color-mix(in srgb, var(--ink) 2.5%, transparent) 32px);
      pointer-events: none;
    }

    .editor-topbar {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      min-height: 68px;
      padding: 0 24px;
      border-bottom: 1px solid var(--line);
      background: color-mix(in srgb, var(--sheet) 86%, transparent);
      backdrop-filter: blur(16px);
    }

    .back-button { display: none; margin-right: 8px; }

    .save-state {
      display: flex;
      align-items: center;
      gap: 7px;
      color: var(--ink-faint);
      font-size: 11px;
    }

    .save-dot {
      width: 7px;
      height: 7px;
      background: var(--moss);
      border-radius: 50%;
      transition: background 160ms ease;
    }

    .save-state.saving .save-dot {
      background: var(--accent);
      animation: pulse 800ms ease infinite alternate;
    }

    @keyframes pulse { to { transform: scale(1.45); opacity: .55; } }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-left: auto;
    }

    .icon-button.active { color: var(--accent); background: var(--accent-soft); }
    .icon-button.danger:hover { color: #b84532; background: rgba(184, 69, 50, .1); }

    .editor-scroll {
      position: relative;
      z-index: 1;
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      scrollbar-color: var(--line-strong) transparent;
      scrollbar-width: thin;
    }

    .note-document {
      width: min(850px, calc(100% - 72px));
      min-height: 100%;
      margin: 0 auto;
      padding: 68px 0 130px;
    }

    .document-kicker {
      color: var(--accent);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: .2em;
      text-transform: uppercase;
    }

    #titleInput {
      display: block;
      width: 100%;
      margin: 13px 0 12px;
      padding: 0;
      color: var(--ink);
      background: transparent;
      border: 0;
      outline: 0;
      font-family: var(--serif);
      font-size: clamp(34px, 5vw, 52px);
      font-weight: 700;
      line-height: 1.16;
      letter-spacing: -.035em;
    }

    #titleInput::placeholder { color: color-mix(in srgb, var(--ink-faint) 45%, transparent); }

    .note-meta-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 7px;
      min-height: 29px;
      margin-bottom: 26px;
      color: var(--ink-faint);
      font-size: 11px;
    }

    .meta-divider { opacity: .45; }

    .note-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .editor-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 7px;
      color: var(--moss);
      background: color-mix(in srgb, var(--moss) 8%, transparent);
      border-radius: 6px;
    }

    .editor-tag button {
      width: 14px;
      height: 14px;
      padding: 0;
      color: inherit;
      background: transparent;
      border: 0;
      cursor: pointer;
      opacity: .55;
    }

    #tagInput {
      width: 118px;
      padding: 4px 2px;
      color: var(--ink);
      background: transparent;
      border: 0;
      border-bottom: 1px dashed var(--line-strong);
      outline: 0;
      font-size: 11px;
    }

    #tagInput::placeholder { color: var(--ink-faint); }

    .tag-input-wrap {
      position: relative;
      display: inline-flex;
      align-items: center;
    }

    .tag-suggestions {
      position: absolute;
      top: calc(100% + 9px);
      left: -8px;
      z-index: 20;
      width: 240px;
      max-width: calc(100vw - 30px);
      padding: 7px;
      overflow: hidden;
      background: color-mix(in srgb, var(--sheet) 96%, transparent);
      border: 1px solid var(--line-strong);
      border-radius: 13px;
      box-shadow: 0 18px 46px rgba(52, 43, 30, .16);
      backdrop-filter: blur(16px);
      transform-origin: top left;
      animation: suggestions-in 150ms cubic-bezier(.2,.8,.2,1) both;
    }

    @keyframes suggestions-in {
      from { opacity: 0; transform: translateY(-5px) scale(.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .tag-suggestions-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 5px 7px 7px;
      color: var(--ink-faint);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .12em;
    }

    .tag-suggestions-title span:last-child {
      font-weight: 500;
      letter-spacing: 0;
    }

    .tag-suggestion {
      display: flex;
      align-items: center;
      gap: 9px;
      width: 100%;
      min-height: 36px;
      padding: 7px 8px;
      color: var(--ink);
      text-align: left;
      background: transparent;
      border: 0;
      border-radius: 8px;
      cursor: pointer;
    }

    .tag-suggestion:hover,
    .tag-suggestion.active {
      background: color-mix(in srgb, var(--moss) 11%, transparent);
    }

    .suggestion-mark {
      display: grid;
      place-items: center;
      width: 23px;
      height: 23px;
      flex: 0 0 auto;
      color: var(--moss);
      background: color-mix(in srgb, var(--moss) 10%, transparent);
      border-radius: 7px;
      font-family: var(--serif);
      font-size: 13px;
      font-weight: 700;
    }

    .tag-suggestion-label {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 12px;
      font-weight: 650;
    }

    .tag-suggestion-source {
      flex: 0 0 auto;
      color: var(--ink-faint);
      font-size: 10px;
    }

    .format-toolbar {
      display: flex;
      align-items: center;
      gap: 3px;
      width: max-content;
      max-width: 100%;
      margin-bottom: 34px;
      padding: 6px;
      overflow-x: auto;
      background: color-mix(in srgb, var(--paper-deep) 62%, transparent);
      border: 1px solid var(--line);
      border-radius: 12px;
      box-shadow: 0 6px 20px rgba(60, 50, 35, .04);
      scrollbar-width: none;
    }

    .format-toolbar::-webkit-scrollbar { display: none; }

    .tool-button {
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      min-width: 31px;
      height: 30px;
      padding: 0 8px;
      color: var(--ink-soft);
      background: transparent;
      border-radius: 7px;
      font-family: var(--serif);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .tool-button:hover { color: var(--ink); background: var(--sheet); }

    .tool-separator { width: 1px; height: 17px; margin: 0 3px; background: var(--line-strong); }

    #contentEditor {
      min-height: 420px;
      color: var(--ink);
      outline: 0;
      font-family: var(--serif);
      font-size: 18px;
      line-height: 1.9;
      letter-spacing: .015em;
      caret-color: var(--accent);
    }

    #contentEditor:empty::before {
      content: attr(data-placeholder);
      color: color-mix(in srgb, var(--ink-faint) 48%, transparent);
      pointer-events: none;
    }

    #contentEditor h1,
    #contentEditor h2,
    #contentEditor h3 {
      margin: 1.4em 0 .55em;
      font-family: var(--serif);
      line-height: 1.35;
    }

    #contentEditor h1 { font-size: 1.65em; }
    #contentEditor h2 { font-size: 1.35em; }
    #contentEditor h3 { font-size: 1.12em; }
    #contentEditor p { margin: 0 0 1em; }
    #contentEditor ul, #contentEditor ol { padding-left: 1.45em; }
    #contentEditor blockquote {
      margin: 1.5em 0;
      padding: .2em 0 .2em 1.25em;
      color: var(--ink-soft);
      border-left: 3px solid var(--accent);
      font-style: italic;
    }

    #contentEditor code {
      padding: .15em .35em;
      background: var(--paper-deep);
      border-radius: 4px;
      font-family: Consolas, monospace;
      font-size: .82em;
    }

    #contentEditor a { color: var(--accent-dark); text-underline-offset: 3px; }

    .editor-footer {
      position: absolute;
      right: 22px;
      bottom: 18px;
      z-index: 2;
      display: flex;
      gap: 13px;
      padding: 7px 10px;
      color: var(--ink-faint);
      background: color-mix(in srgb, var(--sheet) 74%, transparent);
      border: 1px solid var(--line);
      border-radius: 9px;
      backdrop-filter: blur(10px);
      font-size: 10px;
      font-variant-numeric: tabular-nums;
    }

    .empty-editor {
      position: relative;
      z-index: 1;
      display: none;
      flex: 1;
      place-items: center;
      padding: 40px;
      text-align: center;
    }

    .empty-editor.visible { display: grid; }

    .empty-illustration {
      position: relative;
      width: 118px;
      height: 124px;
      margin: 0 auto 27px;
    }

    .empty-page {
      position: absolute;
      inset: 7px 13px 11px 10px;
      background: var(--sheet);
      border: 1px solid var(--line-strong);
      border-radius: 5px 22px 5px 5px;
      box-shadow: 8px 9px 0 var(--accent-soft), var(--shadow);
      transform: rotate(-3deg);
    }

    .empty-page::before {
      content: "";
      position: absolute;
      left: 22px;
      top: 35px;
      width: 50px;
      height: 2px;
      background: var(--accent);
      box-shadow: 0 15px 0 var(--line-strong), 0 30px 0 var(--line-strong);
    }

    .empty-title { font-family: var(--serif); font-size: 23px; font-weight: 700; }
    .empty-copy { margin: 8px 0 18px; color: var(--ink-soft); font-family: var(--serif); }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 28px;
      z-index: 30;
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 250px;
      padding: 12px 14px 12px 17px;
      color: var(--sheet);
      background: color-mix(in srgb, var(--ink) 92%, transparent);
      border: 1px solid var(--line-strong);
      border-radius: 12px;
      box-shadow: var(--shadow);
      opacity: 0;
      transform: translate(-50%, 18px);
      pointer-events: none;
      transition: opacity 180ms ease, transform 180ms ease;
      font-size: 12px;
    }

    .toast.show { opacity: 1; transform: translate(-50%, 0); pointer-events: auto; }
    .toast button { margin-left: auto; color: #ffd1c4; background: transparent; border: 0; cursor: pointer; font-weight: 700; }

    dialog {
      width: min(520px, calc(100% - 32px));
      padding: 0;
      color: var(--ink);
      background: var(--sheet);
      border: 1px solid var(--line-strong);
      border-radius: 18px;
      box-shadow: var(--shadow);
    }

    dialog::backdrop { background: rgba(24, 22, 18, .32); backdrop-filter: blur(4px); }

    .command-panel { padding: 14px; }

    .command-input {
      width: 100%;
      height: 48px;
      padding: 0 14px;
      color: var(--ink);
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 11px;
      outline: 0;
      font-family: var(--serif);
      font-size: 16px;
    }

    .command-hint { padding: 12px 4px 6px; color: var(--ink-faint); font-size: 10px; letter-spacing: .1em; }

    .command-results { max-height: 340px; overflow-y: auto; }

    .command-item {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 11px 10px;
      color: inherit;
      text-align: left;
      background: transparent;
      border: 0;
      border-radius: 10px;
      cursor: pointer;
    }

    .command-item:hover { background: var(--paper-deep); }
    .command-item strong { display: block; font-family: var(--serif); }
    .command-item small { display: block; margin-top: 2px; color: var(--ink-faint); }
    .command-bullet { width: 9px; height: 9px; flex: 0 0 auto; background: var(--accent); border-radius: 50%; }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    [hidden] { display: none !important; }

    :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    @media (max-width: 780px) {
      .app { display: block; }
      .sidebar, .editor-shell { width: 100%; height: 100dvh; }
      .editor-shell { display: none; }
      .app.note-open .sidebar { display: none; }
      .app.note-open .editor-shell { display: flex; }
      .back-button { display: inline-grid; }
      .brand-row { padding-top: 19px; }
      .note-document { width: calc(100% - 42px); padding-top: 42px; }
      #titleInput { font-size: 36px; }
      #contentEditor { font-size: 17px; }
      .editor-topbar { min-height: 60px; padding: 0 11px; }
      .editor-footer { right: 12px; bottom: 12px; }
    }

    @media (max-width: 420px) {
      .note-document { width: calc(100% - 30px); }
      .save-state span:last-child {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
      }
      .format-toolbar { width: 100%; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { scroll-behavior: auto !important; animation-duration: .01ms !important; transition-duration: .01ms !important; }
    }
  </style>
</head>
<body>
  <main class="app" id="app">
    <aside class="sidebar" aria-label="笔记导航">
      <header class="brand-row">
        <div class="brand" aria-label="纸间">
          <span class="brand-mark" aria-hidden="true"></span>
          <span>
            <span class="brand-name">纸间</span>
            <span class="brand-sub">私人笔记</span>
          </span>
        </div>
        <button class="icon-button" id="openCommand" title="快速查找（Ctrl/⌘ K）" aria-label="快速查找">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m20 20-4-4"/></svg>
        </button>
      </header>

      <div class="search-wrap">
        <span class="search-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="7"/><path d="m20 20-4-4"/></svg></span>
        <label class="sr-only" for="searchInput">搜索笔记</label>
        <input id="searchInput" type="search" placeholder="搜索标题、正文或标签…" autocomplete="off">
        <span class="shortcut">⌘ K</span>
      </div>

      <nav class="filter-row" aria-label="笔记筛选">
        <button class="filter-button active" data-filter="all">全部 <span class="filter-count" id="allCount">0</span></button>
        <button class="filter-button" data-filter="pinned">置顶 <span class="filter-count" id="pinnedCount">0</span></button>
      </nav>
      <div class="tag-strip" id="tagStrip" aria-label="标签筛选"></div>
      <div class="list-label"><span id="listLabel">最近编辑</span><span id="resultCount">0 篇</span></div>
      <div class="notes-list" id="notesList" role="listbox" aria-label="笔记列表"></div>

      <footer class="sidebar-footer">
        <label class="theme-control" title="选择主题模式">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><circle cx="12" cy="12" r="8"/><path d="M12 4v8l5 3"/></svg>
          <span class="sr-only">主题模式</span>
          <select id="themeSelect" aria-label="主题模式">
            <option value="auto">随时间</option>
            <option value="light">浅色</option>
            <option value="dark">深色</option>
          </select>
        </label>
        <button class="icon-button" id="importButton" title="导入 JSON" aria-label="导入笔记">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path d="M12 3v12m0 0 4-4m-4 4-4-4"/><path d="M4 17v3h16v-3"/></svg>
        </button>
        <button class="icon-button" id="exportButton" title="导出备份" aria-label="导出笔记">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path d="M12 16V4m0 0 4 4m-4-4L8 8"/><path d="M4 14v6h16v-6"/></svg>
        </button>
        <input id="fileInput" type="file" accept="application/json,.json" hidden>
        <button class="new-note" id="newNoteButton">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
          新建笔记
        </button>
      </footer>
    </aside>

    <section class="editor-shell" id="editorShell" aria-label="笔记编辑器">
      <header class="editor-topbar" id="editorTopbar">
        <button class="icon-button back-button" id="backButton" aria-label="返回笔记列表">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="m15 18-6-6 6-6"/></svg>
        </button>
        <div class="save-state" id="saveState" role="status"><span class="save-dot"></span><span id="saveText">已保存在此设备</span></div>
        <div class="topbar-actions">
          <button class="icon-button" id="pinButton" title="置顶笔记" aria-label="置顶笔记">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="m14 4 6 6-3 1-4 4-1 5-3-5-5-3 5-1 4-4 1-3Z"/><path d="m4 20 5-5"/></svg>
          </button>
          <button class="icon-button danger" id="deleteButton" title="删除笔记" aria-label="删除笔记">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 7h16M9 7V4h6v3M7 7l1 13h8l1-13M10 11v5M14 11v5"/></svg>
          </button>
        </div>
      </header>

      <div class="editor-scroll" id="editorScroll">
        <article class="note-document" id="noteDocument">
          <div class="document-kicker">个人笔记</div>
          <label class="sr-only" for="titleInput">笔记标题</label>
          <input id="titleInput" type="text" placeholder="无标题笔记" maxlength="160" autocomplete="off">
          <div class="note-meta-row">
            <span id="updatedText">刚刚编辑</span><span class="meta-divider">•</span>
            <div class="note-tags" id="noteTags"></div>
            <div class="tag-input-wrap">
              <label class="sr-only" for="tagInput">添加标签</label>
              <input id="tagInput" type="text" maxlength="20" placeholder="+ 添加标签" autocomplete="off" aria-autocomplete="list" aria-controls="tagSuggestions" aria-expanded="false">
              <div class="tag-suggestions" id="tagSuggestions" role="listbox" aria-label="标签推荐" hidden></div>
            </div>
          </div>
          <div class="format-toolbar" role="toolbar" aria-label="文本格式">
            <button class="tool-button" data-command="formatBlock" data-value="p" title="正文">正文</button>
            <button class="tool-button" data-command="formatBlock" data-value="h2" title="标题">H2</button>
            <span class="tool-separator"></span>
            <button class="tool-button" data-command="bold" title="加粗（Ctrl/⌘ B）"><b>B</b></button>
            <button class="tool-button" data-command="italic" title="斜体（Ctrl/⌘ I）"><i>I</i></button>
            <button class="tool-button" data-command="strikeThrough" title="删除线"><s>S</s></button>
            <span class="tool-separator"></span>
            <button class="tool-button" data-command="insertUnorderedList" title="无序列表">• 列表</button>
            <button class="tool-button" data-command="insertOrderedList" title="有序列表">1.</button>
            <button class="tool-button" data-command="formatBlock" data-value="blockquote" title="引用">“ ”</button>
            <button class="tool-button" id="linkButton" title="添加链接">↗</button>
            <button class="tool-button" data-command="removeFormat" title="清除格式">清除</button>
          </div>
          <div id="contentEditor" contenteditable="true" role="textbox" aria-multiline="true" spellcheck="true" data-placeholder="从一个念头开始。纸张已经备好……"></div>
        </article>
      </div>
      <footer class="editor-footer" id="editorFooter"><span id="charCount">0 字</span><span id="readTime">约 0 分钟</span></footer>
      <div class="empty-editor" id="emptyEditor">
        <div>
          <div class="empty-illustration" aria-hidden="true"><div class="empty-page"></div></div>
          <div class="empty-title">留一点空白给新想法</div>
          <p class="empty-copy">新建一篇笔记，或者从左侧选一篇继续写。</p>
          <button class="new-note" id="emptyNewButton">新建第一篇笔记</button>
        </div>
      </div>
    </section>
  </main>

  <div class="toast" id="toast" role="status"><span id="toastText"></span><button id="undoButton" hidden>撤销</button></div>

  <dialog id="commandDialog" aria-label="快速查找">
    <div class="command-panel">
      <input class="command-input" id="commandInput" type="search" placeholder="输入笔记标题、正文或标签…" autocomplete="off">
      <div class="command-hint">快速跳转 · 按 ESC 关闭</div>
      <div class="command-results" id="commandResults"></div>
    </div>
  </dialog>

  <script>
    (() => {
      'use strict';

      const STORAGE_KEY = 'zhijian.notes.v1';
      const THEME_MODE_KEY = 'zhijian.theme.mode.v2';
      const LEGACY_THEME_KEY = 'zhijian.theme.v1';
      const RECOMMENDED_TAGS = ['工作', '学习', '生活', '灵感', '计划', '阅读', '待办', '项目'];
      const ALLOWED_TAGS = new Set(['P','DIV','BR','B','STRONG','I','EM','U','S','H1','H2','H3','BLOCKQUOTE','UL','OL','LI','A','CODE','PRE','SPAN']);
      const $ = (selector) => document.querySelector(selector);
      const $$ = (selector) => [...document.querySelectorAll(selector)];

      const elements = {
        app: $('#app'), notesList: $('#notesList'), search: $('#searchInput'),
        allCount: $('#allCount'), pinnedCount: $('#pinnedCount'), resultCount: $('#resultCount'),
        tagStrip: $('#tagStrip'), listLabel: $('#listLabel'), noteDocument: $('#noteDocument'),
        emptyEditor: $('#emptyEditor'), editorScroll: $('#editorScroll'), title: $('#titleInput'), editor: $('#contentEditor'),
        tagInput: $('#tagInput'), tagSuggestions: $('#tagSuggestions'), noteTags: $('#noteTags'), updatedText: $('#updatedText'),
        saveState: $('#saveState'), saveText: $('#saveText'), pin: $('#pinButton'),
        charCount: $('#charCount'), readTime: $('#readTime'), editorFooter: $('#editorFooter'),
        toast: $('#toast'), toastText: $('#toastText'), undo: $('#undoButton'),
        commandDialog: $('#commandDialog'), commandInput: $('#commandInput'),
        commandResults: $('#commandResults'), fileInput: $('#fileInput'), themeSelect: $('#themeSelect')
      };

      const now = Date.now();
      const seedNotes = [
        {
          id: crypto.randomUUID(),
          title: '欢迎来到纸间',
          content: '<p>这里是一块安静的写作空间。你的所有内容都会<strong>自动保存在当前浏览器</strong>中，不会上传到任何地方。</p><h2>从这里开始</h2><ul><li>按 <strong>Ctrl / ⌘ + N</strong> 新建笔记</li><li>按 <strong>Ctrl / ⌘ + K</strong> 快速查找</li><li>给笔记添加标签，慢慢长出自己的知识脉络</li></ul><blockquote>好笔记不是仓库，而是思考留下的脚印。</blockquote>',
          tags: ['开始', '指南'], pinned: true, createdAt: now - 86400000 * 4, updatedAt: now - 1000 * 60 * 8
        },
        {
          id: crypto.randomUUID(),
          title: '本周的三个重点',
          content: '<h2>少做一点，做深一点</h2><p>□ 完成产品原型的核心流程</p><p>□ 整理用户访谈里反复出现的问题</p><p>□ 留出一个不被打扰的下午阅读</p><p>其余想法先放入「以后也许」清单，不让它们占据今天。</p>',
          tags: ['计划', '工作'], pinned: false, createdAt: now - 86400000 * 2, updatedAt: now - 1000 * 60 * 55
        },
        {
          id: crypto.randomUUID(),
          title: '读书摘记：创造的秩序',
          content: '<p>真正的秩序不是把一切排得整整齐齐，而是让重要的东西容易被看见。</p><h2>留下的问题</h2><ol><li>哪些流程只是习惯，并没有实际价值？</li><li>如果只能保留一个功能，它会是什么？</li><li>怎样让工具退到背景里？</li></ol>',
          tags: ['阅读', '灵感'], pinned: false, createdAt: now - 86400000 * 7, updatedAt: now - 86400000
        }
      ];

      let notes = loadNotes();
      let selectedId = notes[0]?.id || null;
      let activeFilter = 'all';
      let activeTag = '';
      let saveTimer = null;
      let isDirty = false;
      let toastTimer = null;
      let lastDeleted = null;
      let currentTagSuggestions = [];
      let activeSuggestionIndex = 0;
      let themeMode = 'auto';

      function loadNotes() {
        try {
          const stored = localStorage.getItem(STORAGE_KEY);
          if (!stored) return seedNotes;
          const parsed = JSON.parse(stored);
          return Array.isArray(parsed) ? parsed.map(normalizeNote).filter(Boolean) : seedNotes;
        } catch (error) {
          console.warn('读取本地笔记失败，已载入示例内容。', error);
          return seedNotes;
        }
      }

      function normalizeNote(note) {
        if (!note || typeof note !== 'object') return null;
        const timestamp = Date.now();
        return {
          id: typeof note.id === 'string' && note.id ? note.id : crypto.randomUUID(),
          title: String(note.title || '').slice(0, 160),
          content: sanitizeHTML(String(note.content || '')),
          tags: Array.isArray(note.tags) ? [...new Set(note.tags.map(tag => cleanTag(tag)).filter(Boolean))].slice(0, 12) : [],
          pinned: Boolean(note.pinned),
          createdAt: Number(note.createdAt) || timestamp,
          updatedAt: Number(note.updatedAt) || timestamp
        };
      }

      function sanitizeHTML(html) {
        const template = document.createElement('template');
        template.innerHTML = html;
        const walk = (node) => {
          [...node.childNodes].forEach(child => {
            if (child.nodeType === Node.ELEMENT_NODE) {
              if (!ALLOWED_TAGS.has(child.tagName)) {
                child.replaceWith(...child.childNodes);
                return;
              }
              const href = child.tagName === 'A' ? child.getAttribute('href') : null;
              [...child.attributes].forEach(attr => child.removeAttribute(attr.name));
              if (child.tagName === 'A') {
                if (href && /^(https?:|mailto:)/i.test(href)) {
                  child.setAttribute('href', href);
                  child.setAttribute('target', '_blank');
                  child.setAttribute('rel', 'noopener noreferrer');
                }
              }
              walk(child);
            } else if (child.nodeType !== Node.TEXT_NODE) {
              child.remove();
            }
          });
        };
        walk(template.content);
        return template.innerHTML;
      }

      function escapeHTML(value) {
        return String(value).replace(/[&<>'"]/g, char => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[char]));
      }

      function cleanTag(value) {
        return String(value || '').trim().replace(/^#+/, '').replace(/[<>]/g, '').slice(0, 20);
      }

      function plainText(html) {
        const template = document.createElement('template');
        template.innerHTML = html;
        return (template.content.textContent || '').replace(/\s+/g, ' ').trim();
      }

      function persist(showStatus = false) {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
          if (showStatus) setSaveState('saved');
        } catch (error) {
          setSaveState('error');
          showToast('本地存储空间不足，请先导出备份');
        }
      }

      function currentNote() { return notes.find(note => note.id === selectedId) || null; }

      function sortedNotes(list = notes) {
        return [...list].sort((a, b) => Number(b.pinned) - Number(a.pinned) || b.updatedAt - a.updatedAt);
      }

      function filteredNotes() {
        const query = elements.search.value.trim().toLocaleLowerCase('zh-CN');
        return sortedNotes().filter(note => {
          if (activeFilter === 'pinned' && !note.pinned) return false;
          if (activeTag && !note.tags.includes(activeTag)) return false;
          if (!query) return true;
          return `${note.title} ${plainText(note.content)} ${note.tags.join(' ')}`.toLocaleLowerCase('zh-CN').includes(query);
        });
      }

      function relativeTime(timestamp) {
        const diff = Math.max(0, Date.now() - timestamp);
        const minutes = Math.floor(diff / 60000);
        if (minutes < 1) return '刚刚';
        if (minutes < 60) return `${minutes} 分钟前`;
        const hours = Math.floor(minutes / 60);
        if (hours < 24) return `${hours} 小时前`;
        const days = Math.floor(hours / 24);
        if (days < 7) return `${days} 天前`;
        return new Intl.DateTimeFormat('zh-CN', { month: 'short', day: 'numeric' }).format(timestamp);
      }

      function renderAll(loadEditor = true) {
        renderCounts();
        renderTags();
        renderList();
        if (loadEditor) renderEditor();
      }

      function renderCounts() {
        elements.allCount.textContent = notes.length;
        elements.pinnedCount.textContent = notes.filter(note => note.pinned).length;
      }

      function renderTags() {
        const counts = new Map();
        notes.forEach(note => note.tags.forEach(tag => counts.set(tag, (counts.get(tag) || 0) + 1)));
        elements.tagStrip.innerHTML = [...counts.entries()]
          .sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0], 'zh-CN'))
          .slice(0, 12)
          .map(([tag, count]) => `<button class="tag-chip ${activeTag === tag ? 'active' : ''}" data-tag="${escapeHTML(tag)}">#${escapeHTML(tag)} · ${count}</button>`)
          .join('');
        elements.tagStrip.hidden = counts.size === 0;
      }

      function renderList() {
        const visible = filteredNotes();
        elements.resultCount.textContent = `${visible.length} 篇`;
        elements.listLabel.textContent = elements.search.value.trim() ? '搜索结果' : activeTag ? `# ${activeTag}` : activeFilter === 'pinned' ? '置顶笔记' : '最近编辑';
        if (!visible.length) {
          elements.notesList.innerHTML = '<div class="list-empty">没有找到相符的笔记。<br>换个词，或写下一篇新的。</div>';
          return;
        }
        elements.notesList.innerHTML = visible.map(note => {
          const preview = plainText(note.content) || '这篇笔记还是空白，等你落笔。';
          const tags = note.tags.slice(0, 2).map(tag => `<span class="mini-tag">#${escapeHTML(tag)}</span>`).join('');
          return `<button class="note-card ${note.id === selectedId ? 'active' : ''}" data-id="${escapeHTML(note.id)}" role="option" aria-selected="${note.id === selectedId}">
            <span class="note-card-head"><span class="note-card-title">${escapeHTML(note.title || '无标题笔记')}</span>${note.pinned ? '<span class="pin-dot" title="已置顶"></span>' : ''}</span>
            <span class="note-card-preview">${escapeHTML(preview)}</span>
            <span class="note-card-meta"><span>${relativeTime(note.updatedAt)}</span>${tags}</span>
          </button>`;
        }).join('');
      }

      function renderEditor() {
        const note = currentNote();
        const hasNote = Boolean(note);
        elements.noteDocument.hidden = !hasNote;
        elements.editorFooter.hidden = !hasNote;
        elements.emptyEditor.classList.toggle('visible', !hasNote);
        $('#pinButton').hidden = !hasNote;
        $('#deleteButton').hidden = !hasNote;
        if (!note) return;
        isDirty = false;
        elements.title.value = note.title;
        elements.editor.innerHTML = sanitizeHTML(note.content);
        elements.updatedText.textContent = `${relativeTime(note.updatedAt)}编辑`;
        elements.pin.classList.toggle('active', note.pinned);
        elements.pin.setAttribute('aria-pressed', String(note.pinned));
        elements.pin.title = note.pinned ? '取消置顶' : '置顶笔记';
        renderCurrentTags();
        updateStats();
      }

      function renderCurrentTags() {
        const note = currentNote();
        elements.noteTags.innerHTML = note ? note.tags.map(tag => `<span class="editor-tag">#${escapeHTML(tag)}<button data-remove-tag="${escapeHTML(tag)}" aria-label="移除标签 ${escapeHTML(tag)}">×</button></span>`).join('') : '';
      }

      function getTagSuggestions(query = '') {
        const note = currentNote();
        if (!note || note.tags.length >= 12) return [];
        const normalizedQuery = query.toLocaleLowerCase('zh-CN');
        const counts = new Map();
        notes.forEach(item => item.tags.forEach(tag => counts.set(tag, (counts.get(tag) || 0) + 1)));
        const selected = new Set(note.tags);
        const existing = [...counts.entries()]
          .filter(([tag]) => !selected.has(tag))
          .sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0], 'zh-CN'))
          .map(([tag, count]) => ({ tag, source: `已用 ${count} 次` }));
        const existingNames = new Set(existing.map(item => item.tag));
        const recommended = RECOMMENDED_TAGS
          .filter(tag => !selected.has(tag) && !existingNames.has(tag))
          .map(tag => ({ tag, source: '推荐' }));
        const suggestions = [...existing, ...recommended]
          .filter(item => !normalizedQuery || item.tag.toLocaleLowerCase('zh-CN').includes(normalizedQuery));
        const cleanedQuery = cleanTag(query);
        if (cleanedQuery && !selected.has(cleanedQuery) && !suggestions.some(item => item.tag === cleanedQuery)) {
          suggestions.unshift({ tag: cleanedQuery, source: '新建' });
        }
        return suggestions.slice(0, 8);
      }

      function renderTagSuggestions() {
        currentTagSuggestions = getTagSuggestions(elements.tagInput.value);
        if (!currentTagSuggestions.length) {
          closeTagSuggestions();
          return;
        }
        activeSuggestionIndex = Math.min(Math.max(activeSuggestionIndex, 0), currentTagSuggestions.length - 1);
        elements.tagSuggestions.innerHTML = `<div class="tag-suggestions-title"><span>推荐标签</span><span>↑↓ 选择</span></div>${currentTagSuggestions.map((item, index) => `<button type="button" id="tagSuggestion${index}" class="tag-suggestion ${index === activeSuggestionIndex ? 'active' : ''}" role="option" aria-selected="${index === activeSuggestionIndex}" data-suggestion-index="${index}"><span class="suggestion-mark">#</span><span class="tag-suggestion-label">${escapeHTML(item.tag)}</span><span class="tag-suggestion-source">${escapeHTML(item.source)}</span></button>`).join('')}`;
        elements.tagSuggestions.hidden = false;
        elements.tagInput.setAttribute('aria-expanded', 'true');
        elements.tagInput.setAttribute('aria-activedescendant', `tagSuggestion${activeSuggestionIndex}`);
      }

      function openTagSuggestions() {
        activeSuggestionIndex = 0;
        renderTagSuggestions();
      }

      function closeTagSuggestions() {
        elements.tagSuggestions.hidden = true;
        elements.tagInput.setAttribute('aria-expanded', 'false');
        elements.tagInput.removeAttribute('aria-activedescendant');
        currentTagSuggestions = [];
        activeSuggestionIndex = 0;
      }

      function selectNote(id) {
        if (!notes.some(note => note.id === id)) return;
        closeTagSuggestions();
        flushSave();
        selectedId = id;
        renderAll(true);
        elements.app.classList.add('note-open');
        elements.editorScroll.scrollTop = 0;
      }

      function createNote() {
        closeTagSuggestions();
        flushSave();
        const timestamp = Date.now();
        const note = { id: crypto.randomUUID(), title: '', content: '', tags: [], pinned: false, createdAt: timestamp, updatedAt: timestamp };
        notes.unshift(note);
        selectedId = note.id;
        activeFilter = 'all';
        activeTag = '';
        elements.search.value = '';
        updateFilterButtons();
        persist(true);
        renderAll(true);
        elements.app.classList.add('note-open');
        requestAnimationFrame(() => elements.title.focus());
        showToast('新笔记已经备好');
      }

      function scheduleSave() {
        isDirty = true;
        setSaveState('saving');
        clearTimeout(saveTimer);
        saveTimer = setTimeout(() => flushSave(), 420);
      }

      function flushSave() {
        clearTimeout(saveTimer);
        saveTimer = null;
        const note = currentNote();
        if (!note || elements.noteDocument.hidden || !isDirty) return;
        note.title = elements.title.value.trim();
        note.content = sanitizeHTML(elements.editor.innerHTML);
        note.updatedAt = Date.now();
        isDirty = false;
        persist(true);
        renderList();
        elements.updatedText.textContent = '刚刚编辑';
        updateStats();
      }

      function setSaveState(state) {
        elements.saveState.classList.toggle('saving', state === 'saving');
        elements.saveText.textContent = state === 'saving' ? '正在保存…' : state === 'error' ? '保存失败' : '已保存在此设备';
      }

      function updateStats() {
        const text = elements.editor.textContent.trim();
        const count = text.replace(/\s/g, '').length;
        const words = text.split(/\s+/).filter(Boolean).length;
        elements.charCount.textContent = `${count} 字`;
        elements.readTime.textContent = `约 ${Math.max(1, Math.ceil(Math.max(count / 400, words / 220)))} 分钟`;
      }

      function togglePin() {
        const note = currentNote();
        if (!note) return;
        note.pinned = !note.pinned;
        note.updatedAt = Date.now();
        persist(true);
        renderAll(false);
        elements.pin.classList.toggle('active', note.pinned);
        elements.pin.setAttribute('aria-pressed', String(note.pinned));
        elements.pin.title = note.pinned ? '取消置顶' : '置顶笔记';
        showToast(note.pinned ? '已置顶这篇笔记' : '已取消置顶');
      }

      function deleteCurrent() {
        const index = notes.findIndex(note => note.id === selectedId);
        if (index < 0) return;
        lastDeleted = { note: notes[index], index };
        notes.splice(index, 1);
        if (activeTag && !notes.some(note => note.tags.includes(activeTag))) activeTag = '';
        selectedId = sortedNotes()[0]?.id || null;
        persist(true);
        renderAll(true);
        showToast('笔记已删除', true);
      }

      function undoDelete() {
        if (!lastDeleted) return;
        notes.splice(Math.min(lastDeleted.index, notes.length), 0, lastDeleted.note);
        selectedId = lastDeleted.note.id;
        lastDeleted = null;
        persist(true);
        renderAll(true);
        hideToast();
      }

      function showToast(message, canUndo = false) {
        clearTimeout(toastTimer);
        elements.toastText.textContent = message;
        elements.undo.hidden = !canUndo;
        elements.toast.classList.add('show');
        toastTimer = setTimeout(hideToast, canUndo ? 6000 : 2600);
      }

      function hideToast() { elements.toast.classList.remove('show'); }

      function addTag(value) {
        const note = currentNote();
        const tag = cleanTag(value);
        if (!note || !tag) return;
        if (!note.tags.includes(tag) && note.tags.length >= 12) {
          closeTagSuggestions();
          showToast('每篇笔记最多添加 12 个标签');
          return;
        }
        if (!note.tags.includes(tag) && note.tags.length < 12) note.tags.push(tag);
        elements.tagInput.value = '';
        note.updatedAt = Date.now();
        persist(true);
        renderTags();
        renderList();
        renderCurrentTags();
        closeTagSuggestions();
      }

      function removeTag(tag) {
        const note = currentNote();
        if (!note) return;
        note.tags = note.tags.filter(item => item !== tag);
        if (activeTag === tag && !notes.some(item => item.tags.includes(tag))) activeTag = '';
        note.updatedAt = Date.now();
        persist(true);
        renderTags();
        renderList();
        renderCurrentTags();
        if (document.activeElement === elements.tagInput) renderTagSuggestions();
      }

      function updateFilterButtons() {
        $$('.filter-button').forEach(button => button.classList.toggle('active', button.dataset.filter === activeFilter));
      }

      function applyFormat(command, value = null) {
        elements.editor.focus();
        document.execCommand(command, false, value);
        scheduleSave();
      }

      function addLink() {
        const selection = window.getSelection();
        if (!selection || selection.isCollapsed) {
          showToast('先选中一段文字，再添加链接');
          return;
        }
        const url = window.prompt('输入链接地址（https://…）');
        if (!url) return;
        const normalized = /^(https?:|mailto:)/i.test(url) ? url : `https://${url}`;
        applyFormat('createLink', normalized);
      }

      function getTimedTheme(date = new Date()) {
        const hour = date.getHours();
        return hour >= 6 && hour < 18 ? 'light' : 'dark';
      }

      function resolveTheme(mode, date = new Date()) {
        return mode === 'auto' ? getTimedTheme(date) : mode;
      }

      function applyTheme(theme) {
        document.documentElement.dataset.theme = theme;
      }

      function setThemeMode(mode, persistMode = true) {
        themeMode = ['auto', 'light', 'dark'].includes(mode) ? mode : 'auto';
        applyTheme(resolveTheme(themeMode));
        elements.themeSelect.value = themeMode;
        elements.themeSelect.title = themeMode === 'auto'
          ? '当前随时间切换：06:00–18:00 浅色，其余时间深色'
          : `当前为${themeMode === 'light' ? '浅色' : '深色'}主题`;
        if (persistMode) localStorage.setItem(THEME_MODE_KEY, themeMode);
      }

      function refreshTimedTheme() {
        if (themeMode === 'auto') applyTheme(getTimedTheme());
      }

      function exportNotes() {
        flushSave();
        const payload = { app: '纸间', version: 1, exportedAt: new Date().toISOString(), notes };
        const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json;charset=utf-8' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `纸间笔记-${new Date().toISOString().slice(0, 10)}.json`;
        link.click();
        URL.revokeObjectURL(link.href);
        showToast(`已导出 ${notes.length} 篇笔记`);
      }

      async function importNotes(file) {
        if (!file) return;
        try {
          const parsed = JSON.parse(await file.text());
          const incoming = Array.isArray(parsed) ? parsed : parsed.notes;
          if (!Array.isArray(incoming)) throw new Error('格式不正确');
          const normalized = incoming.map(normalizeNote).filter(Boolean);
          if (!normalized.length) throw new Error('没有可导入的笔记');
          const existingIds = new Set(notes.map(note => note.id));
          normalized.forEach(note => {
            if (existingIds.has(note.id)) note.id = crypto.randomUUID();
          });
          notes = [...normalized, ...notes];
          selectedId = normalized[0].id;
          persist(true);
          renderAll(true);
          showToast(`已安全导入 ${normalized.length} 篇笔记`);
        } catch (error) {
          showToast('导入失败：请选择纸间导出的 JSON 文件');
        } finally {
          elements.fileInput.value = '';
        }
      }

      function openCommandPalette() {
        elements.commandInput.value = '';
        renderCommandResults();
        elements.commandDialog.showModal();
        requestAnimationFrame(() => elements.commandInput.focus());
      }

      function renderCommandResults() {
        const query = elements.commandInput.value.trim().toLocaleLowerCase('zh-CN');
        const results = sortedNotes().filter(note => !query || `${note.title} ${plainText(note.content)} ${note.tags.join(' ')}`.toLocaleLowerCase('zh-CN').includes(query)).slice(0, 8);
        elements.commandResults.innerHTML = results.length ? results.map(note => `<button class="command-item" data-command-id="${escapeHTML(note.id)}"><span class="command-bullet"></span><span><strong>${escapeHTML(note.title || '无标题笔记')}</strong><small>${escapeHTML(note.tags.map(tag => `#${tag}`).join(' ') || relativeTime(note.updatedAt))}</small></span></button>`).join('') : '<div class="list-empty">没有找到笔记</div>';
      }

      elements.notesList.addEventListener('click', event => {
        const card = event.target.closest('[data-id]');
        if (card) selectNote(card.dataset.id);
      });

      elements.search.addEventListener('input', renderList);
      elements.title.addEventListener('input', scheduleSave);
      elements.editor.addEventListener('input', () => { updateStats(); scheduleSave(); });
      elements.editor.addEventListener('paste', event => {
        event.preventDefault();
        document.execCommand('insertText', false, event.clipboardData.getData('text/plain'));
      });

      elements.tagInput.addEventListener('focus', openTagSuggestions);
      elements.tagInput.addEventListener('input', () => {
        activeSuggestionIndex = 0;
        renderTagSuggestions();
      });

      elements.tagInput.addEventListener('keydown', event => {
        if (event.key === 'ArrowDown' || event.key === 'ArrowUp') {
          event.preventDefault();
          if (elements.tagSuggestions.hidden) openTagSuggestions();
          else {
            const direction = event.key === 'ArrowDown' ? 1 : -1;
            activeSuggestionIndex = (activeSuggestionIndex + direction + currentTagSuggestions.length) % currentTagSuggestions.length;
            renderTagSuggestions();
          }
          return;
        }
        if (event.key === 'Enter' || event.key === ',') {
          event.preventDefault();
          const suggested = !elements.tagSuggestions.hidden ? currentTagSuggestions[activeSuggestionIndex]?.tag : '';
          addTag(event.key === 'Enter' && suggested ? suggested : elements.tagInput.value);
          return;
        }
        if (event.key === 'Escape') closeTagSuggestions();
      });

      elements.tagInput.addEventListener('blur', () => {
        const pendingTag = elements.tagInput.value;
        const pendingNoteId = selectedId;
        setTimeout(() => {
          if (pendingTag && selectedId === pendingNoteId) addTag(pendingTag);
          closeTagSuggestions();
        }, 100);
      });
      elements.tagSuggestions.addEventListener('pointerdown', event => event.preventDefault());
      elements.tagSuggestions.addEventListener('click', event => {
        const button = event.target.closest('[data-suggestion-index]');
        if (!button) return;
        const suggestion = currentTagSuggestions[Number(button.dataset.suggestionIndex)];
        if (suggestion) addTag(suggestion.tag);
      });
      elements.noteTags.addEventListener('click', event => {
        const button = event.target.closest('[data-remove-tag]');
        if (button) removeTag(button.dataset.removeTag);
      });

      elements.tagStrip.addEventListener('click', event => {
        const button = event.target.closest('[data-tag]');
        if (!button) return;
        activeTag = activeTag === button.dataset.tag ? '' : button.dataset.tag;
        renderTags();
        renderList();
      });

      $$('.filter-button').forEach(button => button.addEventListener('click', () => {
        activeFilter = button.dataset.filter;
        updateFilterButtons();
        renderList();
      }));

      $$('.tool-button[data-command]').forEach(button => button.addEventListener('mousedown', event => {
        event.preventDefault();
        applyFormat(button.dataset.command, button.dataset.value || null);
      }));

      $('#linkButton').addEventListener('click', addLink);
      $('#newNoteButton').addEventListener('click', createNote);
      $('#emptyNewButton').addEventListener('click', createNote);
      $('#pinButton').addEventListener('click', togglePin);
      $('#deleteButton').addEventListener('click', deleteCurrent);
      $('#backButton').addEventListener('click', () => elements.app.classList.remove('note-open'));
      elements.themeSelect.addEventListener('change', () => setThemeMode(elements.themeSelect.value));
      $('#exportButton').addEventListener('click', exportNotes);
      $('#importButton').addEventListener('click', () => elements.fileInput.click());
      elements.fileInput.addEventListener('change', () => importNotes(elements.fileInput.files[0]));
      elements.undo.addEventListener('click', undoDelete);
      $('#openCommand').addEventListener('click', openCommandPalette);
      elements.commandInput.addEventListener('input', renderCommandResults);
      elements.commandResults.addEventListener('click', event => {
        const item = event.target.closest('[data-command-id]');
        if (!item) return;
        elements.commandDialog.close();
        selectNote(item.dataset.commandId);
      });

      elements.commandDialog.addEventListener('click', event => {
        if (event.target === elements.commandDialog) elements.commandDialog.close();
      });

      document.addEventListener('keydown', event => {
        const mod = event.ctrlKey || event.metaKey;
        if (mod && event.key.toLowerCase() === 'n') { event.preventDefault(); createNote(); }
        if (mod && event.key.toLowerCase() === 'k') { event.preventDefault(); openCommandPalette(); }
        if (mod && event.key.toLowerCase() === 's') { event.preventDefault(); flushSave(); showToast('笔记已保存'); }
        if (event.key === 'Escape' && !elements.commandDialog.open && window.innerWidth <= 780) elements.app.classList.remove('note-open');
      });

      window.addEventListener('beforeunload', flushSave);
      setInterval(() => {
        const note = currentNote();
        if (note) elements.updatedText.textContent = `${relativeTime(note.updatedAt)}编辑`;
        renderList();
        refreshTimedTheme();
      }, 60000);

      const savedThemeMode = localStorage.getItem(THEME_MODE_KEY);
      setThemeMode(['auto', 'light', 'dark'].includes(savedThemeMode) ? savedThemeMode : 'auto');
      localStorage.removeItem(LEGACY_THEME_KEY);
      persist();
      renderAll(true);

      window.__ZHIJIAN_TEST__ = {
        getNotes: () => JSON.parse(JSON.stringify(notes)),
        createNote,
        selectNote,
        flushSave,
        sanitizeHTML,
        getTimedTheme,
        resolveTheme,
        setThemeMode,
        getThemeMode: () => themeMode,
        storageKey: STORAGE_KEY,
        themeModeKey: THEME_MODE_KEY
      };
    })();
  </script>
</body>
</html>
