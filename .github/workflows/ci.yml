name: Desktop CI

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:

jobs:
  verify:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run rebuild:electron
      - run: npm run build
      - run: npm run test:e2e
      - name: Build unsigned Windows installer
        run: npm run dist:win
      - uses: actions/upload-artifact@v4
        with:
          name: zhijian-windows-unsigned
          path: release/**

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: verify
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - name: Publish unsigned installer to public update repository
        run: npm run dist:win -- --publish always
        env:
          GH_TOKEN: ${{ secrets.RELEASES_TOKEN }}
